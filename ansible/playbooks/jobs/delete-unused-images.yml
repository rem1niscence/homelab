---
- name: setup daily k3s unused image cleanup
  hosts: k3s_cluster
  become: true
  tasks:
    - name: copy cleanup script
      ansible.builtin.copy:
        dest: /usr/local/bin/delete-unused-images.sh
        mode: "0755"
        content: |
          #!/bin/bash

          K3S_CTR="/var/lib/rancher/k3s/data/current/bin/ctr"
          SOCKET_PATH="/run/k3s/containerd/containerd.sock"
          NAMESPACE="k8s.io"

          all_images=$(${K3S_CTR} -a ${SOCKET_PATH} -n ${NAMESPACE} image ls -q | sort -u)

          used_images=$(
              for container in $(${K3S_CTR} -a ${SOCKET_PATH} -n ${NAMESPACE} containers ls -q); do
                  ${K3S_CTR} -a ${SOCKET_PATH} -n ${NAMESPACE} containers info ${container} | grep Image | awk '{print $2}'
              done | sort -u
          )

          comm -23 <(echo "$all_images") <(echo "$used_images") | while read -r image; do
              echo "Removing $image"
              ${K3S_CTR} -a ${SOCKET_PATH} -n ${NAMESPACE} image rm "$image"
          done

          echo "cleanup complete"

    - name: schedule daily cron job
      ansible.builtin.cron:
        name: delete unused k3s images
        job: /usr/local/bin/delete-unused-images.sh >> /var/log/delete-unused-images.log 2>&1
        hour: "3"
        minute: "0"
