---
frp_version: "v0.68.1"
frp_bind_port: 7000
frp_dashboard_port: 7500
frp_config_dir: /opt/frp

frp_network_name: tunnel

# Specified as Docker port-mapping strings, e.g. ["9001:9001", "9002:9002"]
frp_extra_ports: []

# Must be provided via group_vars
# frp_token: ""
# frp_dashboard_username: ""
# frp_dashboard_password: ""
# frp_dashboard_secret_key: ""

frp_caddy_enabled: false
frp_caddy_image: caddy:2

# List of routes Caddy will expose.  Each entry is a dict with:
#   domain:       full domain name (e.g. "blog.example.com")
#   backend_port: port on the frps container to proxy to
# Example:
#   frp_caddy_routes:
#     - domain: blog.example.com
#       backend_port: 50001
#     - domain: other.example.com
#       backend_port: 40001
frp_caddy_routes:
