---
- name: install open-iscsi
  ansible.builtin.package:
    name: open-iscsi
    state: present
  when: iscsi_mounts | length > 0

- name: ensure iscsid is enabled and running
  ansible.builtin.systemd:
    name: iscsid
    state: started
    enabled: true
  when: iscsi_mounts | length > 0

- name: deploy mount_iscsi script to /usr/bin
  ansible.builtin.copy:
    src: mount_iscsi.sh
    dest: /usr/bin/mount_iscsi
    owner: root
    group: root
    mode: "0755"
  when: iscsi_mounts | length > 0

- name: deploy mount_iscsi systemd service
  ansible.builtin.template:
    src: mount_iscsi.service.j2
    dest: /etc/systemd/system/mount_iscsi_{{ item.name }}.service
    owner: root
    group: root
    mode: "0644"
  loop: "{{ iscsi_mounts }}"
  notify: reload systemd

- name: enable and start mount_iscsi service
  ansible.builtin.systemd:
    name: mount_iscsi_{{ item.name }}
    state: started
    enabled: true
    daemon_reload: true
  loop: "{{ iscsi_mounts }}"
