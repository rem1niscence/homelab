apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn-config
  namespace: argocd
  labels:
    type: infra
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  sources:
    - repoURL: git@github.com:rem1niscence/homelab.git
      targetRevision: v2
      path: k8s/charts/longhorn-config
      helm:
        valueFiles:
          - $repo/k8s/values/infra/longhorn-config/values.yml
    - repoURL: git@github.com:rem1niscence/homelab.git
      targetRevision: v2
      ref: repo
    - repoURL: git@github.com:rem1niscence/homelab.git
      targetRevision: v2
      path: k8s/values/infra/longhorn-config/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
