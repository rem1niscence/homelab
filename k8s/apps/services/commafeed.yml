apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: commafeed
  namespace: argocd
  labels:
    type: service
spec:
  project: default
  source:
    repoURL: git@github.com:rem1niscence/homelab.git
    targetRevision: deploy
    path: k8s/services/commafeed
  destination:
    server: https://kubernetes.default.svc
    namespace: commafeed
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
