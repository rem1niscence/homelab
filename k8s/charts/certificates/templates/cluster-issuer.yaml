{{- range .Values.clusterIssuers }}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .name }}
spec:
  acme:
    server: {{ .server }}
    email: {{ $.Values.certManagerEmail | quote }}
    privateKeySecretRef:
      name: {{ .name }}-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: {{ $.Values.cloudflareApiTokenSecretName }}
              key: api-token
{{- end }}
