apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: frp
  name: frpc
  labels:
    app: frpc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frpc
  template:
    metadata:
      labels:
        app: frpc
    spec:
      nodeSelector:
        platformio/type: main
      containers:
        - name: frpc
          image: ghcr.io/fatedier/frpc:v0.63.0
          args: ["-c", "/etc/frp/frpc.toml"]
          envFrom:
            - secretRef:
                name: frpc
          volumeMounts:
            - name: frpc
              mountPath: /etc/frp
      volumes:
        - name: frpc
          configMap:
            name: frpc
            items:
              - key: client
                path: frpc.toml
---
apiVersion: v1
kind: Service
metadata:
  namespace: canopy
  name: frp
spec:
  ports:
    - port: 80
      targetPort: 7500
      name: frpc
    - port: 7501
      targetPort: 7501
      name: frps
  selector:
    app: frpc
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  namespace: canopy
  name: main
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host("frpc.rvserver.online")
      kind: Rule
      services:
        - name: frp
          port: 80
    - match: Host("frps.rvserver.online")
      kind: Rule
      services:
        - name: frp
          port: 7501
---
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: canopy
  name: frpc
data:
  client: |
    serverAddr = "{{ .Envs.FRP_SERVER_ADDR }}"
    serverPort = {{ .Envs.FRP_SERVER_PORT }}

    [auth]
    method = "token"
    token = "{{ .Envs.FRP_SERVER_TOKEN }}"

    # [[proxies]]
    # name = "example-1"
    # type = "tcp"
    # localIP = "svc-1"
    # localPort = 50001
    # remotePort = 50001

    [webServer]
    addr = "0.0.0.0"
    port = 7500
    user = "{{ .Envs.FRP_WEB_SERVER_USER }}"
    password = "{{ .Envs.FRP_WEB_SERVER_PASSWORD }}"

    [[visitors]]
    name = "frps-dashboard-visitor"
    type = "stcp"

    # must match the provider's proxy name
    serverName = "frps-dashboard-stcp"
    secretKey = "{{ .Envs.FRPS_VISITOR_KEY }}"

    bindAddr = "0.0.0.0"
    bindPort = 7501
