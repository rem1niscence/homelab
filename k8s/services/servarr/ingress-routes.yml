apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: servarr
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`radarr.rvserver.online`)
      kind: Rule
      services:
        - name: radarr
          port: 7878
    - match: Host(`prowlarr.rvserver.online`)
      kind: Rule
      services:
        - name: prowlarr
          port: 9696
    - match: Host(`sonarr.rvserver.online`)
      kind: Rule
      services:
        - name: sonarr
          port: 8989
    - match: Host(`bazarr.rvserver.online`)
      kind: Rule
      services:
        - name: bazarr
          port: 6767
    - match: Host(`monitarr.rvserver.online`)
      kind: Rule
      services:
        - name: monitarr
          port: 80
