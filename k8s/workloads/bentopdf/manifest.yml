apiVersion: apps/v1
kind: Deployment
metadata:
  name: bentopdf
  labels:
    app: bentopdf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bentopdf
  template:
    metadata:
      labels:
        app: bentopdf
    spec:
      nodeSelector:
        platform.io/type: pi
      containers:
        - name: bentopdf
          image: ghcr.io/alam00000/bentopdf:latest
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: bentopdf
spec:
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: bentopdf
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: bentopdf
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`pdf.remini.site`)
      kind: Rule
      services:
        - name: bentopdf
          port: 80
---
apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: bentopdf
  namespace: argocd
spec:
  applicationRefs:
    - namePattern: "bentopdf"
      images:
        - alias: bentopdf
          imageName: ghcr.io/alam00000/bentopdf:latest
          commonUpdateSettings:
            updateStrategy: "digest"
