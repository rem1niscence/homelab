apiVersion: apps/v1
kind: Deployment
metadata:
  name: commafeed
  labels:
    app: commafeed
  annotations:
    keel.sh/policy: all
    keel.sh/pollSchedule: "@every 1h"
    keel.sh/trigger: poll
spec:
  replicas: 1
  selector:
    matchLabels:
      app: commafeed
  template:
    metadata:
      labels:
        app: commafeed
    spec:
      nodeSelector:
        platform.io/type: pi
      containers:
        - name: commafeed
          image: athou/commafeed:latest-postgresql-jvm
          ports:
            - containerPort: 8082
          env:
            - name: "QUARKUS_DATASOURCE_JDBC_URL"
              value: "jdbc:postgresql://db:5432/commafeed"
            - name: "QUARKUS_DATASOURCE_USERNAME"
              value: "commafeed"
            - name: "QUARKUS_DATASOURCE_PASSWORD"
              value: "fIp2JZ3Sa4"
          volumeMounts:
            - name: data
              mountPath: /commafeed/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  labels:
    app: db
  annotations:
    keel.sh/policy: all
    keel.sh/pollSchedule: "@every 1h"
    keel.sh/trigger: poll
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: db
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "commafeed"
            - name: POSTGRES_USER
              value: "commafeed"
            - name: POSTGRES_PASSWORD
              value: "fIp2JZ3Sa4"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: db
              mountPath: /var/lib/postgresql/data
              subPath: postgres
      volumes:
        - name: db
          persistentVolumeClaim:
            claimName: db
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1G
  storageClassName: longhorn-local
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1G
  storageClassName: longhorn-local
---
apiVersion: v1
kind: Service
metadata:
  name: db
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: db
---
apiVersion: v1
kind: Service
metadata:
  name: commafeed
spec:
  ports:
    - port: 80
      targetPort: 8082
  selector:
    app: commafeed
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: commafeed
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`commafeed.rvserver.online`)
      kind: Rule
      services:
        - name: commafeed
          port: 80
