apiVersion: apps/v1
kind: Deployment
metadata:
  name: drawio
  labels:
    app: drawio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: drawio
  template:
    metadata:
      labels:
        app: drawio
    spec:
      nodeSelector:
        platform.io/type: pi
      containers:
        - name: drawio
          image: jgraph/drawio:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: drawio
spec:
  selector:
    app: drawio
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: drawio

spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`drawio.remini.site`)
      kind: Rule
      services:
        - name: drawio
          port: 80
---
apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: drawio
  namespace: argocd
spec:
  applicationRefs:
    - namePattern: "drawio"
      images:
        - alias: drawio
          imageName: jgraph/drawio:latest
          commonUpdateSettings:
            updateStrategy: "digest"
