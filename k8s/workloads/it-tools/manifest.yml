apiVersion: apps/v1
kind: Deployment
metadata:
  name: it-tools
  labels:
    app: it-tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: it-tools
  template:
    metadata:
      labels:
        app: it-tools
    spec:
      nodeSelector:
        platform.io/type: pi
      containers:
        - name: it-tools
          image: ghcr.io/sharevb/it-tools:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: it-tools
spec:
  selector:
    app: it-tools
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: it-tools

spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`it-tools.remini.site`)
      kind: Rule
      services:
        - name: it-tools
          port: 80
---
apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: it-tools
  namespace: argocd
spec:
  applicationRefs:
    - namePattern: "it-tools"
      images:
        - alias: it-tools
          imageName: ghcr.io/sharevb/it-tools:latest
          commonUpdateSettings:
            updateStrategy: "digest"
