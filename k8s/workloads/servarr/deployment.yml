apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitarr
  labels:
    app: monitarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monitarr
  template:
    metadata:
      labels:
        app: monitarr
    spec:
      nodeSelector:
        platform.io/type: main
      containers:
        - name: monitarr
          image: ghcr.io/nickshanks347/monitarr:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: SONARR_URL
              value: "http://sonarr:8989"
            - name: SONARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: monitarr
                  key: SONARR_API_KEY
                  optional: false
            - name: RADARR_URL
              value: "http://radarr:7878"
            - name: RADARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: monitarr
                  key: RADARR_API_KEY
                  optional: false
---
apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: servarr
  namespace: argocd
spec:
  applicationRefs:
    - namePattern: "servarr"
      images:
        - alias: radarr
          imageName: lscr.io/linuxserver/radarr:latest
          commonUpdateSettings:
            updateStrategy: "digest"
        - alias: sonarr
          imageName: lscr.io/linuxserver/sonarr:latest
          commonUpdateSettings:
            updateStrategy: "digest"
        - alias: bazarr
          imageName: lscr.io/linuxserver/bazarr:latest
          commonUpdateSettings:
            updateStrategy: "digest"
        - alias: monitarr
          imageName: ghcr.io/nickshanks347/monitarr:latest
          commonUpdateSettings:
            updateStrategy: "digest"
        - alias: prowlarr
          imageName: lscr.io/linuxserver/prowlarr:latest
          commonUpdateSettings:
            updateStrategy: "digest"
        - alias: flaresolverr
          imageName: ghcr.io/flaresolverr/flaresolverr:latest
          commonUpdateSettings:
            updateStrategy: "digest"
        - alias: gluetun
          imageName: qmcgaw/gluetun:latest
          commonUpdateSettings:
            updateStrategy: "digest"
