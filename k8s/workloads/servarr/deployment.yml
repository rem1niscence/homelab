apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr
  labels:
    app: prowlarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prowlarr
  template:
    metadata:
      labels:
        app: prowlarr
      annotations:
        # bypass Cilium's eBPF datapath for VPN traffic
        io.cilium.no-track-port: "9696,8191"
        io.cilium.proxy-visibility: "<Ingress/9696/TCP>,<Ingress/8191/TCP>"
    spec:
      nodeSelector:
        platform.io/type: main
      initContainers:
        - name: gluetun
          image: qmcgaw/gluetun:latest
          imagePullPolicy: IfNotPresent
          # makes it an init sidecar container
          # https://kubernetes.io/docs/concepts/workloads/pods/sidecar-containers/
          restartPolicy: Always
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
            privileged: true
          envFrom:
            - secretRef:
                name: gluetun
          ports:
            - containerPort: 8191
              name: flaresolverr
            - containerPort: 9696
              name: prowlarr
          env:
            - name: TZ
              value: Etc/UTC
            - name: VPN_TYPE
              value: wireguard
            - name: DNS_KEEP_NAMESERVER
              value: "on"
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: "10.42.0.0/15"
            - name: FIREWALL_VPN_INPUT_PORTS
              value: "9696,8191"
            - name: FIREWALL_INPUT_PORTS
              value: "9696,8191"
            - name: HEALTH_SERVER_ADDRESS
              value: "0.0.0.0:9999"
            - name: FIREWALL
              value: "off"
          volumeMounts:
            - name: config
              mountPath: /gluetun
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - /gluetun-entrypoint healthcheck
            initialDelaySeconds: 3
            periodSeconds: 3
      containers:
        - name: prowlarr
          image: lscr.io/linuxserver/prowlarr:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Etc/UTC"
          volumeMounts:
            - name: data
              mountPath: /data/media
            - name: config
              mountPath: /config
        - name: flaresolverr
          image: ghcr.io/flaresolverr/flaresolverr:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: LOG_LEVEL
              value: "info"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: data-pvc
        - name: config
          persistentVolumeClaim:
            claimName: prowlarr-config-pvc
---
