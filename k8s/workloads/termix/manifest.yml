apiVersion: apps/v1
kind: Deployment
metadata:
  name: termix
  labels:
    app: termix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: termix
  template:
    metadata:
      labels:
        app: termix
    spec:
      nodeSelector:
        platform.io/type: main
      containers:
        - name: termix
          image: ghcr.io/lukegus/termix:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SITE_NAME
              value: "Homelabtermix"
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: termix-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: termix-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1100Mi
  storageClassName: longhorn-local
---
apiVersion: v1
kind: Service
metadata:
  name: termix
spec:
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: termix
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: termix
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`termix.remini.site`)
      kind: Rule
      services:
        - name: termix
          port: 80
---
apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: termix
  namespace: argocd
spec:
  applicationRefs:
    - namePattern: "termix"
      images:
        - alias: termix
          imageName: ghcr.io/lukegus/termix:latest
          commonUpdateSettings:
            updateStrategy: "digest"
