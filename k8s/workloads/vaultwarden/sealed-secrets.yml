    DOMAIN: 
    SEND_ALLOWED: 
    SIGNUPS_ALLOWED: 
    SIGNUPS_VERIFY: 
    SIGNUPS_VERIFY_RESEND_LIMIT: 
    SIGNUPS_VERIFY_RESEND_TIME: 
    SMTP_AUTH_MECHANISM: 
    SMTP_FROM: 
